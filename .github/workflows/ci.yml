# Tiered CI — Architecture v1.0, Doc 24 Phase 0 / Doc 18 §5.
# Fast lane on every PR (<5 min budget); full 3-OS matrix on merge to main and nightly.
name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * *'

defaults:
  run:
    shell: bash

jobs:
  fast:
    name: Fast lane
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm depcruise
      - run: pnpm typecheck
      # Build precedes test: crash-injection tests spawn children that import the built dist.
      - run: pnpm build
      - run: pnpm test

  gate-selftest:
    # Doc 24 Phase 0 acceptance: a deliberate forbidden import must fail CI.
    # This job proves the dependency gate fires; if depcruise ever passes the
    # violation, the gate is broken and the build fails.
    name: Dependency gate self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Inject forbidden import (shared -> observability, violates C28)
        run: |
          printf "import '../observability/index.js';\nexport {};\n" \
            > packages/keel/src/shared/gate-selftest-violation.ts
      - name: Expect depcruise to fail
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on a forbidden import"
            exit 1
          fi
          echo "gate fired as expected"
          rm packages/keel/src/shared/gate-selftest-violation.ts
      - name: Inject forbidden import (model -> shared, violates C21)
        run: |
          printf "import '../shared/index.js';\nexport {};\n" \
            > packages/keel/src/model/gate-selftest-violation.ts
      - name: Expect depcruise to fail on model purity violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on a model purity violation"
            exit 1
          fi
          echo "model purity gate fired as expected"
          rm packages/keel/src/model/gate-selftest-violation.ts
      - name: Inject forbidden import (execution -> cli, violates execution isolation)
        run: |
          printf "import '../cli/args.js';\nexport {};\n" \
            > packages/keel/src/execution/gate-selftest-violation.ts
      - name: Expect depcruise to fail on execution isolation violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on an execution isolation violation"
            exit 1
          fi
          echo "execution isolation gate fired as expected"
          rm packages/keel/src/execution/gate-selftest-violation.ts
      - name: Inject forbidden import (sqlite outside storage, violates C36)
        run: |
          printf "import Database from 'better-sqlite3';\nexport const t = typeof Database;\n" \
            > packages/keel/src/cli/gate-selftest-violation.ts
      - name: Expect depcruise to fail on sqlite-outside-storage violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on sqlite outside storage"
            exit 1
          fi
          echo "sqlite containment gate fired as expected"
          rm packages/keel/src/cli/gate-selftest-violation.ts
      - name: Inject forbidden import (capture -> storage, violates C22 ports pattern)
        run: |
          printf "import '../storage/index.js';\nexport {};\n" \
            > packages/keel/src/capture/gate-selftest-violation.ts
      - name: Expect depcruise to fail on capture-storage violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on capture importing storage"
            exit 1
          fi
          echo "capture ports gate fired as expected"
          rm packages/keel/src/capture/gate-selftest-violation.ts
      - name: Inject forbidden import (replay -> capture, violates Doc 20 §4 normalizer port)
        run: |
          printf "import '../capture/index.js';\nexport {};\n" \
            > packages/keel/src/replay/gate-selftest-violation.ts
      - name: Expect depcruise to fail on replay-capture violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on replay importing capture"
            exit 1
          fi
          echo "replay ports gate fired as expected"
          rm packages/keel/src/replay/gate-selftest-violation.ts
      - name: Inject forbidden import (diff -> shared, violates diff purity C8)
        run: |
          printf "import '../shared/index.js';\nexport {};\n" \
            > packages/keel/src/diff/gate-selftest-violation.ts
      - name: Expect depcruise to fail on diff purity violation
        run: |
          if pnpm depcruise; then
            echo "::error::dependency gate FAILED TO FIRE on diff purity"
            exit 1
          fi
          echo "diff purity gate fired as expected"

  matrix:
    name: Full matrix (${{ matrix.os }}, node ${{ matrix.node }})
    if: github.event_name != 'pull_request'
    needs: fast
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: Smoke the CLI
        run: node packages/keel/dist/cli/main.js --version
